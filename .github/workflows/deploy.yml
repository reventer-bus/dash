name: Deploy — Maker AI (fofus.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Vercel deploys automatically via its GitHub App on every push.
  # Railway deploys automatically via its GitHub App on every push.
  # This job is a manual fallback using Railway CLI when the GitHub App
  # is not connected — it skips gracefully if RAILWAY_TOKEN is not set.

  deploy-backend:
    name: Backend → Railway (CLI fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Runs from repo root — Dockerfile and railway.toml live here
        # Skips gracefully if RAILWAY_TOKEN secret is not configured
        run: |
          test -n "$RAILWAY_TOKEN" || { echo "RAILWAY_TOKEN not set — skipping"; exit 0; }
          railway up \
            --project d8f71a07-6890-431b-8e99-425d5bcd97f8 \
            --environment production \
            --detach
