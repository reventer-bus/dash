# Mosquitto MQTT broker — FOFUS Pi printer agents

# Plain MQTT on port 1883 (local network only)
listener 1883
allow_anonymous true

# WebSocket listener (for browser-based monitoring)
listener 9883
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
