worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;

    # ── Backend API upstream ──────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    # ── Partner dashboard (nginx static inside frontend container) ────────────
    upstream dashboard {
        server frontend:80;
    }

    # ── Main server — HTTP only (Tailscale Funnel handles TLS externally) ────
    #
    # Setup:
    #   1. Install Tailscale on Ubuntu: curl -fsSL https://tailscale.com/install.sh | sh
    #   2. tailscale up
    #   3. tailscale funnel 80   ← exposes this nginx on https://<hostname>.ts.net
    #
    # Your public Shopify webhook URL will be:
    #   https://<hostname>.ts.net/api/v1/shopify/webhook
    #
    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Shopify webhook — higher rate limit bucket
        location /api/v1/shopify/webhook {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;   # Funnel is HTTPS
            proxy_read_timeout 30s;
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            client_max_body_size 50M;   # STL file uploads
        }

        # Partner dashboard (busienss.fofus.in — also served from same nginx)
        # Vercel handles this domain in production; this is for local access
        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }
    }
}
