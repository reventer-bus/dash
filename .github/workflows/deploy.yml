name: Deploy — Maker AI (fofus.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend → Railway ────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --project d8f71a07-6890-431b-8e99-425d5bcd97f8 \
            --environment production \
            --service maker-ai-backend \
            --detach

  # ── Frontend → Vercel ────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: npm run build

      - name: Deploy to Vercel
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel deploy ./dist \
            --prod \
            --token "$VERCEL_TOKEN" \
            --scope team_0Hgvroljj9QDQ6wv7Y6Mokd0 \
            --name maker-ai \
            --yes
