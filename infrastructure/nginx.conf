worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting for API endpoints
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;

    # ── Backend API ──────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    # ── Partner dashboard (nginx static inside frontend container) ──────────
    upstream dashboard {
        server frontend:80;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt / Certbot ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── API server (api.fofus.in or same domain /api/*) ──────────────────────
    server {
        listen 443 ssl;
        server_name api.fofus.in;   # change to your domain / local IP

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Health check — no rate limit
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Shopify webhook — separate rate limit bucket
        location /api/v1/shopify/webhook {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            client_max_body_size 50M;   # STL file uploads
        }
    }

    # ── Partner dashboard (busienss.fofus.in) ───────────────────────────────
    server {
        listen 443 ssl;
        server_name busienss.fofus.in business.fofus.in;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;    # WebSocket for Vite HMR
            proxy_set_header Connection "upgrade";
        }
    }
}
