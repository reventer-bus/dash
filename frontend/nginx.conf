server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the host backend on port 4322
    # Uses host.docker.internal to reach the host from inside the container
    location /api/ {
        proxy_pass http://host.docker.internal:4322;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # Health endpoint
    location /health {
        proxy_pass http://host.docker.internal:4322;
        proxy_set_header Host $host;
    }
}